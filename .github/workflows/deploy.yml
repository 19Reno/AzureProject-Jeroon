name: Build → ACR

on:
  push:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Azure Login
      uses: azure/login@v1
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Login to ACR
      run: az acr login --name acrjeroon

    - name: Build and Push
      run: |
        IMAGE_TAG=${{ github.sha }}
        docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/myngnix:$IMAGE_TAG .
        docker push ${{ secrets.ACR_LOGIN_SERVER }}/myngnix:$IMAGE_TAG
