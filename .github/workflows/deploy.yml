name: ShopFlow — Build → ACR → AKS

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  ACR_REGISTRY: acrjeroon.azurecr.io
  FRONTEND_IMAGE: shopflow-frontend
  BACKEND_IMAGE: shopflow-backend

jobs:
  build-push:
    name: Build & Push to ACR
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Azure Login (OIDC)
      uses: azure/login@v1
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Login to ACR
      run: az acr login --name acrjeroon

    - name: Build & Push Frontend
      run: |
        docker build -t ${{ env.ACR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }} ./apps/frontend
        docker push ${{ env.ACR_REGISTRY }}/${{ env.FRONTEND_IMAGE }}:${{ github.sha }}

    - name: Build & Push Backend
      run: |
        docker build -t ${{ env.ACR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }} ./apps/backend
        docker push ${{ env.ACR_REGISTRY }}/${{ env.BACKEND_IMAGE }}:${{ github.sha }}

  deploy:
    name: Deploy to AKS
    runs-on: ubuntu-latest
    needs: [ build-push ]
    permissions:
      id-token: write
      contents: read

    steps:
    - uses: actions/checkout@v4

    - name: Azure Login (OIDC)
      uses: azure/login@v1
      with:
        client-id: ${{ secrets.AZURE_CLIENT_ID }}
        tenant-id: ${{ secrets.AZURE_TENANT_ID }}
        subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

    - name: Start AKS if stopped
      run: |
        STATUS=$(az aks show \
          --resource-group AzureProject \
          --name aks-shopflow \
          --query "powerState.code" -o tsv)
        echo "AKS status: $STATUS"
        if [ "$STATUS" = "Stopped" ]; then
          az aks start --resource-group AzureProject --name aks-shopflow
        else
          echo "AKS already running, skipping start."
        fi

    - name: Get AKS credentials
      run: |
        az aks get-credentials \
          --resource-group AzureProject \
          --name aks-shopflow \
          --overwrite-existing

    - name: Deploy with Helm
      run: |
        helm upgrade --install shopflow ./helm/shopflow \
          --namespace shopflow \
          --create-namespace \
          --set frontend.image.tag=${{ github.sha }} \
          --set backend.image.tag=${{ github.sha }} \
          --wait --timeout 5m0s

    - name: Verify rollout
      run: |
        kubectl rollout status deployment/shopflow-frontend -n shopflow
        kubectl rollout status deployment/shopflow-backend -n shopflow
