apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: shopflow-backend-hpa
  namespace: shopflow
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: shopflow-backend
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70
---
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: shopflow-backend-pdb
  namespace: shopflow
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: shopflow-backend
